spring.application.name=order-processing

# ===== H2 File-Based Database =====
# Data persists between restarts — stored in ./data/orderdb.mv.db
spring.datasource.url=jdbc:h2:file:./data/orderdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== H2 Console =====
# Access at http://localhost:8080/h2-console during demo to view tables live
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA Settings =====
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===== Database Setup =====
# ---------------------------------------------------------------
# FIRST RUN ONLY
# Use these settings on the very first run to create the schema
# and load the seed data. Switch to PERSISTENT MODE after.
#
# spring.jpa.hibernate.ddl-auto=create-drop
# spring.sql.init.mode=always
# ---------------------------------------------------------------

# ---------------------------------------------------------------
# PERSISTENT MODE — active after first successful run
# Keeps existing schema and data between restarts.
# Seed data will not reload — data survives every restart.
#
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
# ---------------------------------------------------------------

# ===== Scheduler =====
spring.task.scheduling.enabled=true

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== Server =====
server.port=8080

# ===== Logging =====
logging.level.com.sohna.order_processing=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
# ===== Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packagesToScan=com.sohna.order_processing.controller
springdoc.pathsToMatch=/api/**